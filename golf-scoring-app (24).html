const TCOLS=["#e8f5e9","#e3f2fd","#fff8e1","#f3e5f5","#fce4ec","#e0f7fa","#fff3e0","#f1f8e9"];
const TBORD=["#52b788","#1565c0","#d4a017","#6a1b9a","#c2185b","#00838f","#e65100","#558b2f"];

// ── Tournament List ───────────────────────────────────────────────────────────
function TournamentPage({data,url,refresh}){
  const [tourns,setTourns]=useState(()=>{
    // Merge: GAS tournaments take priority if available, fallback to localStorage
    try{const s=localStorage.getItem(LS_TOURNS);return s?JSON.parse(s):[];}catch{return[];}
  });
  const [delTourn,setDelTourn]=useState(null);
  const [view,setView]=useState("list"); // list | setup | scoring | results
  const [tid,setTid]=useState(null);

  // Sync from GAS data whenever it loads
  useEffect(()=>{
    if(Array.isArray(data.tournaments)){
      setTourns(data.tournaments);
      localStorage.setItem(LS_TOURNS,JSON.stringify(data.tournaments));
    }
  },[data.tournaments]);

  const syncTimerRef=useRef(null);
  const saveTourns=(ts)=>{
    setTourns(ts);
    localStorage.setItem(LS_TOURNS,JSON.stringify(ts));
    // Debounce GAS sync — wait 1.5s after last change before pushing
    if(url){
      if(syncTimerRef.current)clearTimeout(syncTimerRef.current);
      syncTimerRef.current=setTimeout(()=>{
        apiPost(url,"saveTournaments",ts).catch(()=>{});
      },1500);
    }
  };
  const updateT=(id,fn)=>saveTourns(tourns.map(t=>t.id===id?fn(t):t));
  const getT=(id)=>tourns.find(t=>t.id===id);

  const newT=()=>{
    const id=Date.now();
    const t={id,name:"",courseId:data.courses[0]?.id||null,teams:[],groups:[],pairs:[],scores:{},lockedCards:[],status:"setup"};
    saveTourns([...tourns,t]);
    setTid(id);setView("setup");
  };

  if(view!=="list"){
    const t=getT(tid);
    const course=t&&data.courses.find(c=>String(c.id)===String(t.courseId));
    if(!t||!course)return(
      <div><button className="btn btn-ghost" style={{marginBottom:14}} onClick={()=>setView("list")}>← Back</button>
        <div className="card"><p>Tournament or course not found.</p></div></div>
    );
    if(view==="setup")return <TournSetup t={t} course={course} data={data} updateT={updateT} onBack={()=>setView("list")} onStart={()=>{updateT(tid,x=>({...x,status:"scoring"}));setView("scoring");}}/>;
    if(view==="scoring")return <TournScoring t={t} course={course} data={data} updateT={updateT} url={url} refresh={refresh} onBack={()=>setView("list")} onGoResults={()=>setView("results")} onSetup={()=>setView("setup")}/>;
    if(view==="results")return <TournResults t={t} course={course} data={data} updateT={updateT} url={url} refresh={refresh} onBack={()=>setView("list")} onScoring={()=>setView("scoring")}/>;
  }

  return(
    <div>
      <div className="ph">
        <div className="ph-left"><h2>Tournaments</h2><p>{tourns.length} tournament{tourns.length!==1?"s":""} saved locally</p></div>
        <button className="btn btn-primary" onClick={newT} disabled={!data.courses.length}>{!data.courses.length?"Add a course first":"+ New Tournament"}</button>
      </div>
      {!tourns.length&&(
        <div className="card" style={{textAlign:"center",padding:"30px 20px",color:"var(--gray-400)"}}>
          <div style={{fontSize:32,marginBottom:8}}>🏆</div>
          <div style={{fontSize:13}}>No tournaments yet</div>
        </div>
      )}
      {[...tourns].reverse().map(t=>{
        const c=data.courses.find(x=>String(x.id)===String(t.courseId));
        const allDone=t.groups?.length&&t.groups.every(g=>t.lockedCards?.includes(g.id));
        return(
          <div key={t.id} className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontFamily:"Playfair Display,serif",fontSize:17,fontWeight:700,color:"var(--green)"}}>
                  {t.name||"Unnamed Tournament"}
                  {t.status==="scoring"&&!allDone&&<span style={{fontSize:12,fontWeight:400,color:"var(--red)",marginLeft:6}}>(In progress)</span>}
                  {allDone&&<span style={{fontSize:12,fontWeight:400,color:"var(--green-mid)",marginLeft:6}}>(Completed)</span>}
                </div>
                <div style={{fontSize:12,color:"var(--gray-400)",marginTop:3}}>{c?.name||"No course"} · {t.groups?.length||0} groups · {t.teams?.length||0} teams · {t.pairs?.length||0} pairs</div>
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>

                <button className="btn btn-sm btn-ghost" onClick={()=>{setTid(t.id);setView("setup");}}>Setup</button>
                {t.scoringCards?.length>0&&<button className="btn btn-sm btn-gold" onClick={()=>{setTid(t.id);setView("scoring");}}>▶ Resume</button>}
                <button className="btn btn-sm btn-primary" onClick={()=>{setTid(t.id);setView(t.status==="setup"?"scoring":"results");}}>
                  {t.status==="setup"?"Score":"Results"}
                </button>
                <button className="btn btn-sm btn-danger" onClick={()=>setDelTourn(t.id)}>Del</button>
              </div>
            </div>
          </div>
        );
      })}
      {delTourn&&<ConfirmDialog
        msg="Delete tournament?"
        detail="All scores and groups will be permanently deleted."
        okLabel="Delete"
        onOk={()=>{saveTourns(tourns.filter(x=>x.id!==delTourn));setDelTourn(null);}}
        onCancel={()=>setDelTourn(null)}
      />}
    </div>
  );
}

// ── Tournament Setup ──────────────────────────────────────────────────────────
function TournSetup({t,course,data,updateT,onBack,onStart}){
  const [tab,setTab]=useState("details");
  const [msg,setMsg]=useState(null);
  const [teamName,setTeamName]=useState("");
  const N=(txt,tp="ok")=>{setMsg({t:txt,tp});setTimeout(()=>setMsg(null),3500);};

  const set=(k,v)=>updateT(t.id,x=>({...x,[k]:v}));

  // ── Teams ──
  const addTeam=()=>{
    if(!teamName.trim())return;
    updateT(t.id,x=>({...x,teams:[...x.teams,{id:Date.now(),name:teamName.trim(),playerIds:[]}]}));
    setTeamName("");
  };
  const removeTeam=(tid)=>updateT(t.id,x=>({...x,teams:x.teams.filter(t=>t.id!==tid)}));
  const toggleTeamP=(teamId,pid)=>updateT(t.id,x=>({...x,
    teams:x.teams.map(t=>t.id===teamId?{...t,playerIds:t.playerIds?.includes(pid)?t.playerIds.filter(i=>i!==pid):[...(t.playerIds||[]),pid]}:t)
  }));

  // ── Groups ──
  const addGroup=()=>updateT(t.id,x=>({...x,groups:[...x.groups,{id:Date.now(),name:"Group "+(x.groups.length+1),playerIds:[]}]}));
  const removeGroup=(gid)=>updateT(t.id,x=>({...x,groups:x.groups.filter(g=>g.id!==gid)}));
  const toggleGroupP=(gid,pid)=>{
    const grp=t.groups.find(g=>g.id===gid);
    const inThis=grp?.playerIds?.includes(pid);
    const inOther=t.groups.some(g=>g.id!==gid&&g.playerIds?.includes(pid));
    if(inOther&&!inThis)return N("Already in another group","error");
    if(!inThis&&(grp?.playerIds?.length||0)>=4)return N("Max 4 players per group","error");
    updateT(t.id,x=>({...x,groups:x.groups.map(g=>g.id===gid?{...g,playerIds:inThis?g.playerIds.filter(i=>i!==pid):[...(g.playerIds||[]),pid]}:g)}));
  };

  // ── Pairs ──
  const addPair=()=>updateT(t.id,x=>({...x,pairs:[...x.pairs,{id:Date.now(),p1Id:null,p2Id:null,hcp1:null,hcp2:null}]}));
  const removePair=(pid)=>updateT(t.id,x=>({...x,pairs:x.pairs.filter(p=>p.id!==pid)}));
  const setPairF=(pid,k,v)=>updateT(t.id,x=>({...x,pairs:x.pairs.map(p=>p.id===pid?{...p,[k]:v}:p)}));

  const validGroups=t.groups.filter(g=>g.playerIds?.length>0);
  const canStart=t.name.trim()&&validGroups.length>0;

  return(
    <div>
      <div className="ph">
        <div className="ph-left"><h2>{t.name||"New Tournament"}</h2><p>Tournament setup</p></div>
        <div style={{display:"flex",gap:7}}>
          <button className="btn btn-ghost" onClick={onBack}>← All</button>
          <button className="btn btn-primary" onClick={()=>{if(!canStart)return N(t.name?"Add at least one group with players":"Enter tournament name","error");onStart();}}>Start Scoring →</button>
        </div>
      </div>
      {msg&&<Alrt type={msg.tp} msg={msg.t} onClose={()=>setMsg(null)}/>}

      <div className="tabs">
        {[
          {id:"details",label:"Details"},
          {id:"teams",label:`Teams (${t.teams.length})`},
          {id:"groups",label:`Groups (${t.groups.length})`},
          {id:"pairs",label:`Ratarata Pairs (${t.pairs.length})`},
        ].map(s=><div key={s.id} className={"tab"+(tab===s.id?" on":"")} onClick={()=>setTab(s.id)}>{s.label}</div>)}
      </div>

      {tab==="details"&&(
        <div className="card">
          <div className="card-title">Tournament Details</div>
          <div className="fg fg2">
            <div className="ff"><label>Tournament Name</label><input value={t.name} onChange={e=>set("name",e.target.value)} placeholder="Lucky Last Cup 2025"/></div>
            <div className="ff"><label>Course</label>
              <select value={t.courseId} onChange={e=>set("courseId",e.target.value)}>
                {data.courses.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>
          </div>
          <div style={{marginTop:16,padding:12,background:"var(--gray-50)",borderRadius:8,fontSize:12.5,color:"var(--gray-600)"}}>
            <strong>How it works:</strong> Teams use Modified Stableford (75% HC). Groups become scorecards. Ratarata pairs compete hole-by-hole.
          </div>
        </div>
      )}

      {tab==="teams"&&(
        <div className="card">
          <div className="card-title">Teams <span style={{fontSize:12,fontWeight:400,color:"var(--gray-400)"}}>— optional, scored on Modified Stableford (75%)</span></div>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <div className="ff" style={{flex:1}}><label>Team Name</label><input value={teamName} onChange={e=>setTeamName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTeam()} placeholder="Team Alpha"/></div>
            <button className="btn btn-primary" style={{alignSelf:"flex-end"}} onClick={addTeam}>Add Team</button>
          </div>
          {!t.teams.length&&<p style={{fontSize:13,color:"var(--gray-400)"}}>No teams — teams are optional.</p>}
          {t.teams.map((team,ti)=>(
            <div key={team.id} style={{marginBottom:12,padding:13,border:"2px solid "+TBORD[ti%TBORD.length],borderRadius:9,background:TCOLS[ti%TCOLS.length]}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
                <div style={{fontWeight:700,fontSize:13}}>{team.name} <span style={{fontWeight:400,color:"var(--gray-600)",fontSize:12}}>({(team.playerIds||[]).length} players)</span></div>
                <button className="btn btn-sm btn-danger" onClick={()=>removeTeam(team.id)}>Remove</button>
              </div>
              <div className="psel">
                {data.players.filter(p=>{
                  const inThis=team.playerIds?.includes(p.id);
                  const inOther=t.teams.some(ot=>ot.id!==team.id&&(ot.playerIds||[]).includes(p.id));
                  return inThis||!inOther;
                }).map(p=>{
                  const inThis=team.playerIds?.includes(p.id);
                  return(
                    <div key={p.id} className={"pchip"+(inThis?" on":"")} onClick={()=>toggleTeamP(team.id,p.id)}>
                      <span>{inThis?"✓":"○"}</span>
                      <span style={{flex:1}}>{p.name}</span><span className="hc">{p.handicap}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      )}

      {tab==="groups"&&(
        <div>
          <div className="card">
            <div className="card-title">Playing Groups <button className="btn btn-sm btn-primary" style={{marginLeft:"auto"}} onClick={addGroup}>+ Add Group</button></div>
            <Alrt type="info" msg="Each group creates one scorecard. Max 4 players per group. A player can only be in one group."/>
            {!t.groups.length&&<p style={{fontSize:13,color:"var(--gray-400)",marginTop:8}}>No groups yet.</p>}
            {t.groups.map((g,gi)=>{
              const gp=data.players.filter(p=>g.playerIds?.includes(p.id));
              return(
                <div key={g.id} className="group-card">
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
                    <div style={{fontWeight:700,fontSize:13,color:"var(--green)"}}>
                      Group {gi+1} <span style={{fontWeight:400,color:"var(--gray-400)",fontSize:12}}>— {gp.length?gp.map(p=>p.name).join(", "):"Empty"}</span>
                    </div>
                    <button className="btn btn-sm btn-danger" onClick={()=>removeGroup(g.id)}>Remove</button>
                  </div>
                  <div className="psel">
                    {data.players.map(p=>{
                      const inThis=g.playerIds?.includes(p.id);
                      const inOther=t.groups.some(x=>x.id!==g.id&&x.playerIds?.includes(p.id));
                      return(
                        <div key={p.id} className={"pchip"+(inThis?" on":inOther?" disabled":"")}
                          onClick={()=>toggleGroupP(g.id,p.id)} title={inOther?"In another group":""}>
                          <span>{inThis?"✓":inOther?"✗":"○"}</span>
                          <span style={{flex:1}}>{p.name}</span><span className="hc">{p.handicap}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {tab==="pairs"&&(
        <div className="card">
          <div className="card-title">Ratarata Pairs <button className="btn btn-sm btn-primary" style={{marginLeft:"auto"}} onClick={addPair}>+ Add Pair</button></div>
          <Alrt type="info" msg="A player can be in multiple pairs. Override HC per pair — used only for Ratarata scoring."/>
          {!t.pairs.length&&<p style={{fontSize:13,color:"var(--gray-400)",marginTop:8}}>No pairs yet.</p>}
          {t.pairs.map((pair,pi)=>{
            const p1=data.players.find(p=>String(p.id)===String(pair.p1Id));
            const p2=data.players.find(p=>String(p.id)===String(pair.p2Id));
            return(
              <div key={pair.id} className="pair-card">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontWeight:700,fontSize:13,color:"var(--green)"}}>Pair {pi+1}</div>
                  <button className="btn btn-sm btn-danger" onClick={()=>removePair(pair.id)}>Remove</button>
                </div>
                <div className="fg fg4">
                  <div className="ff"><label>Player A</label>
                    <select value={pair.p1Id||""} onChange={e=>setPairF(pair.id,"p1Id",e.target.value||null)}>
                      <option value="">— Select —</option>
                      {data.players.map(p=><option key={p.id} value={p.id}>{p.name} (HC {p.handicap})</option>)}
                    </select>
                  </div>
                  <div className="ff"><label>HC Override A</label>
                    <input type="text" inputMode="decimal"
                      value={pair.hcp1!=null?String(pair.hcp1):(p1?.handicap!=null?String(p1.handicap):"")}
                      onChange={e=>{const v=e.target.value;setPairF(pair.id,"hcp1",v===""?null:v);}}
                      onBlur={e=>{const v=parseFloat(e.target.value);setPairF(pair.id,"hcp1",isNaN(v)?null:v);}}
                      placeholder={p1?String(p1.handicap):"HC"}/>
                  </div>
                  <div className="ff"><label>Player B</label>
                    <select value={pair.p2Id||""} onChange={e=>setPairF(pair.id,"p2Id",e.target.value||null)}>
                      <option value="">— Select —</option>
                      {data.players.map(p=><option key={p.id} value={p.id}>{p.name} (HC {p.handicap})</option>)}
                    </select>
                  </div>
                  <div className="ff"><label>HC Override B</label>
                    <input type="text" inputMode="decimal"
                      value={pair.hcp2!=null?String(pair.hcp2):(p2?.handicap!=null?String(p2.handicap):"")}
                      onChange={e=>{const v=e.target.value;setPairF(pair.id,"hcp2",v===""?null:v);}}
                      onBlur={e=>{const v=parseFloat(e.target.value);setPairF(pair.id,"hcp2",isNaN(v)?null:v);}}
                      placeholder={p2?String(p2.handicap):"HC"}/>
                  </div>
                </div>
                {p1&&p2&&<div style={{marginTop:9,textAlign:"center",fontSize:12.5,fontWeight:700,color:"var(--green-mid)"}}>
                  ⚔️ {p1.name} (HC {pair.hcp1!=null?pair.hcp1:p1.handicap}) vs {p2.name} (HC {pair.hcp2!=null?pair.hcp2:p2.handicap})
                </div>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Tournament Scoring ────────────────────────────────────────────────────────
function TournScoring({t,course,data,updateT,url,refresh,onBack,onGoResults,onSetup}){
  const [activeGid,setActiveGid]=useState(null);
  const [viewGid,setViewGid]=useState(null);
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState(null);
  const N=(txt,tp="ok")=>{setMsg({t:txt,tp});setTimeout(()=>setMsg(null),4000);};

  const gPlayers=(g)=>data.players.filter(p=>g.playerIds?.includes(p.id));
  const isLocked=(gid)=>(t.lockedCards||[]).includes(gid);
  const isScoringActive=(gid)=>(t.scoringCards||[]).includes(gid);
  const allDone=t.groups.length>0&&t.groups.every(g=>isLocked(g.id));

  const setScore=(pid,h,v)=>updateT(t.id,x=>({...x,scores:{...x.scores,[pid]:(x.scores?.[pid]||Array(18).fill("")).map((sv,i)=>i===h?v:sv)}}));

  const finishCard=async(gid)=>{
    setSaving(true);
    try{
      const g=t.groups.find(x=>x.id===gid);
      if(!g){N("Group not found","error");setSaving(false);return;}
      const players=gPlayers(g);
      // Validate every hole has a score for every player
      const incomplete=players.filter(p=>(t.scores?.[p.id]||Array(18).fill("")).some(v=>!parseInt(v)));
      if(incomplete.length){
        N("All 18 holes must be entered for: "+incomplete.map(p=>p.name).join(", "),"error");
        setSaving(false);return;
      }
      const date=new Date().toISOString().split("T")[0];
      const results=calcFormats(players.map(p=>({playerId:p.id,playerName:p.name,handicap:p.handicap,scores:t.scores?.[p.id]||Array(18).fill(0)})),course);
      if(url){
        await apiPost(url,"addScores",results.map(r=>({...r,date,courseId:course.id,courseName:course.name,tournament:t.name,scores:t.scores?.[r.playerId]||Array(18).fill(0)})));
        await refresh();
      }
      updateT(t.id,x=>({...x,
        lockedCards:[...(x.lockedCards||[]),gid],
        scoringCards:(x.scoringCards||[]).filter(id=>id!==gid)
      }));
      N("Card saved and locked ✓");setActiveGid(null);
    }catch(e){N("Error: "+e.message,"error");}
    setSaving(false);
  };

  const startScoring=(gid)=>{
    updateT(t.id,x=>({...x,scoringCards:[...(x.scoringCards||[]).filter(id=>id!==gid),gid]}));
    setActiveGid(gid);
  };

  const saveAndExit=(gid)=>{
    // Release the in-progress lock but keep scores
    updateT(t.id,x=>({...x,scoringCards:(x.scoringCards||[]).filter(id=>id!==gid)}));
    setActiveGid(null);
  };

  const [discardDlg,setDiscardDlg]=useState(null);
  const discardCard=(gid)=>{
    setDiscardDlg(gid);
  };
  const doDiscard=(gid)=>{
    const pids=t.groups.find(g=>g.id===gid)?.playerIds||[];
    updateT(t.id,x=>{
      const newScores={...x.scores};
      pids.forEach(pid=>{delete newScores[String(pid)];delete newScores[pid];});
      return{...x,scores:newScores,scoringCards:(x.scoringCards||[]).filter(id=>id!==gid)};
    });
    setActiveGid(null);setDiscardDlg(null);
    N("Scores discarded","warn");
  };

  // ── View-only mode ──
  if(viewGid){
    const g=t.groups.find(x=>x.id===viewGid);
    if(!g)return null;
    const players=gPlayers(g);
    const complete=isLocked(viewGid);
    const active=isScoringActive(viewGid);
    return(
      <div>
        <div className="ph">
          <div className="ph-left"><h2>{t.name}</h2><p>Viewing Group — {players.map(p=>p.name).join(", ")}</p></div>
          <button className="btn btn-ghost" onClick={()=>setViewGid(null)}>← Back to Groups</button>
        </div>
        <div className={"alert "+(complete?"alert-ok":"alert-info")} style={{marginBottom:12}}>
          👁 <strong>View Only</strong> — {complete?"This card is complete and locked.":active?"Scoring is in progress by another user. Refresh to see latest scores.":"Scores entered so far (not yet submitted)."}
        </div>
        <div className="card">
          <div className="card-title">{course.name} — {complete?"Completed Scorecard":"Scorecard (Read-only)"}</div>
          <ScorecardGrid course={course} players={players} scores={t.scores||{}} setScore={null} locked={true}/>
        </div>
        {players.some(p=>(t.scores?.[p.id]||[]).some(v=>parseInt(v)>0))&&(
          <div className="card">
            <div className="card-title">{complete?"Final Scores":"Live Scores"} {active&&!complete&&<span className="live-dot"/>}</div>
            <table className="dt">
              <thead><tr><th>Player</th><th>HC</th><th>Gross</th><th>Stableford</th><th>Mod SF 75%</th><th>Net</th></tr></thead>
              <tbody>
                {calcFormats(players.map(p=>({playerId:p.id,playerName:p.name,handicap:p.handicap,scores:t.scores?.[p.id]||Array(18).fill(0)})),course).map(r=>(
                  <tr key={r.playerId}>
                    <td style={{fontWeight:600}}>{r.playerName}</td><td>{r.handicap}</td>
                    <td>{r.gross||"—"}</td>
                    <td><span className="badge b-green">{r.stableford}</span></td>
                    <td><span className="badge b-blue">{r.modStableford}</span></td>
                    <td>{r.strokeNet||"—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    );
  }

  // ── Active scoring view ──
  if(activeGid){
    const g=t.groups.find(x=>x.id===activeGid);
    if(!g)return null;
    const players=gPlayers(g);
    return(
      <>
        <div>
        <div className="ph">
          <div className="ph-left"><h2>{t.name}</h2><p>Scoring: {players.map(p=>p.name).join(", ")}</p></div>
          <button className="btn btn-ghost" onClick={()=>saveAndExit(g.id)}>← Save & Exit</button>
        </div>
        {msg&&<Alrt type={msg.tp} msg={msg.t} onClose={()=>setMsg(null)}/>}
        <div className="card">
          <div className="card-title">{course.name} — Group Scorecard</div>
          <ScorecardGrid course={course} players={players} scores={t.scores||{}} setScore={setScore} locked={false}/>
          <div className="btn-row" style={{marginTop:12}}>
            <button className="btn btn-gold" onClick={()=>finishCard(g.id)} disabled={saving}>
              {saving?<><Spin/>Saving…</>:"✓ Finish Round & Lock Card"}
            </button>
            <button className="btn btn-ghost" onClick={()=>saveAndExit(g.id)}>Save & Exit</button>
            <button className="btn btn-danger btn-sm" onClick={()=>discardCard(g.id)}>🗑 Discard</button>
          </div>
        </div>
        {players.some(p=>(t.scores?.[p.id]||[]).some(v=>parseInt(v)>0))&&(
          <div className="card">
            <div className="card-title">Live Scores <span className="live-dot"/></div>
            <table className="dt">
              <thead><tr><th>Player</th><th>HC</th><th>Gross</th><th>Stableford</th><th>Mod SF 75%</th><th>Net</th></tr></thead>
              <tbody>
                {calcFormats(players.map(p=>({playerId:p.id,playerName:p.name,handicap:p.handicap,scores:t.scores?.[p.id]||Array(18).fill(0)})),course).map(r=>(
                  <tr key={r.playerId}>
                    <td style={{fontWeight:600}}>{r.playerName}</td><td>{r.handicap}</td>
                    <td>{r.gross||"—"}</td>
                    <td><span className="badge b-green">{r.stableford}</span></td>
                    <td><span className="badge b-blue">{r.modStableford}</span></td>
                    <td>{r.strokeNet||"—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
      {discardDlg&&<ConfirmDialog
        msg="Discard all scores?"
        detail="All hole scores for this group will be permanently cleared."
        okLabel="Discard"
        onOk={()=>doDiscard(discardDlg)}
        onCancel={()=>setDiscardDlg(null)}
      />}
      </>
    );
  }

  // ── Group list overview ──
  return(
    <div>
      <div className="ph">
        <div className="ph-left"><h2>{t.name}</h2><p>{course.name} · {t.groups.length} group{t.groups.length!==1?"s":""}</p></div>
        <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
          <button className="btn btn-ghost" onClick={onBack}>← All Tournaments</button>
          <button className="btn btn-ghost btn-sm" onClick={onSetup}>⚙ Setup</button>
          <button className="btn btn-primary" onClick={onGoResults}>📊 Results</button>
          {allDone&&<button className="btn btn-gold" onClick={()=>{updateT(t.id,x=>({...x,status:"complete"}));onGoResults();}}>🏁 Finalise</button>}
        </div>
      </div>
      {msg&&<Alrt type={msg.tp} msg={msg.t} onClose={()=>setMsg(null)}/>}
      {allDone&&<Alrt type="ok" msg="All groups completed! Click Finalise to mark the tournament complete."/>}
      {!t.groups.length&&<Alrt type="warn" msg="No groups set up — go to Setup to add playing groups."/>}
      {t.groups.map((g,gi)=>{
        const players=gPlayers(g);
        const locked=isLocked(g.id);
        const scoringNow=isScoringActive(g.id);
        const hasPartialScores=players.some(p=>(t.scores?.[p.id]||[]).some(v=>parseInt(v)>0));
        return(
          <div key={g.id} className={"group-card"+(locked?" locked":"")}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{fontWeight:700,fontSize:14,color:"var(--green)"}}>Group {gi+1}</div>
                <div style={{fontSize:12.5,color:"var(--gray-600)",marginTop:3}}>
                  {players.length?players.map(p=>`${p.name} (HC ${p.handicap})`).join(" · "):"Empty group"}
                </div>
                {!locked&&scoringNow&&(
                  <div style={{display:"flex",alignItems:"center",gap:5,marginTop:4}}>
                    <span className="live-dot" style={{width:7,height:7}}/>
                    <span style={{fontSize:11,color:"var(--red)",fontWeight:700}}>Scoring in progress</span>
                  </div>
                )}
                {!locked&&!scoringNow&&hasPartialScores&&(
                  <div style={{fontSize:11,color:"var(--gold)",marginTop:3,fontWeight:600}}>● Partially scored</div>
                )}
              </div>
              <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
                {locked?(
                  <>
                    <span className="badge b-green">✓ Complete</span>
                    <button className="btn btn-sm btn-ghost" onClick={()=>setViewGid(g.id)}>👁 View</button>
                    <button className="btn btn-sm btn-ghost" onClick={()=>{
                      updateT(t.id,x=>({...x,lockedCards:(x.lockedCards||[]).filter(id=>id!==g.id)}));
                      N("Card unlocked — scores preserved");
                    }}>Unlock</button>
                  </>
                ):scoringNow?(
                  <>
                    <span className="badge b-red" style={{animation:"pulse 1.5s ease-in-out infinite"}}>⏳ In Progress</span>
                    <button className="btn btn-sm btn-ghost" onClick={()=>setViewGid(g.id)}>👁 View Only</button>
                  </>
                ):(
                  <button className="btn btn-primary" onClick={()=>startScoring(g.id)}>{hasPartialScores?"▶ Resume Scoring":"▶ Start Scoring"}</button>
                )}
              </div>
            </div>
          </div>
        );
      })}
      {discardDlg&&<ConfirmDialog
        msg="Discard all scores?"
        detail="All hole scores for this group will be permanently cleared."
        okLabel="Discard"
        onOk={()=>doDiscard(discardDlg)}
        onCancel={()=>setDiscardDlg(null)}
      />}
    </div>
  );
}

// ── Tournament Results ────────────────────────────────────────────────────────
function TournResults({t,course,data,updateT,url,refresh,onBack,onScoring}){
  const [tab,setTab]=useState("individual");
  const [expandedPairs,setExpandedPairs]=useState(new Set());
  const togglePair=(idx)=>setExpandedPairs(prev=>{const n=new Set(prev);n.has(idx)?n.delete(idx):n.add(idx);return n;});

  const allGroupPlayerIds=new Set(t.groups.flatMap(g=>g.playerIds||[]));
  const allPlayers=data.players.filter(p=>allGroupPlayerIds.has(p.id));
  const isLive=t.status!=="complete";

  const indivResults=useMemo(()=>{
    if(!course||!allPlayers.length)return[];
    return calcFormats(allPlayers.map(p=>({playerId:p.id,playerName:p.name,handicap:p.handicap,scores:t.scores?.[p.id]||Array(18).fill(0)})),course);
  },[allPlayers,t.scores,course]);

  const pairResults=useMemo(()=>{
    if(!course||!t.pairs?.length)return[];
    return t.pairs.filter(p=>p.p1Id&&p.p2Id).map(pair=>{
      const p1=data.players.find(p=>String(p.id)===String(pair.p1Id));
      const p2=data.players.find(p=>String(p.id)===String(pair.p2Id));
      if(!p1||!p2)return null;
      return calcPair({p1,p2,hcp1:pair.hcp1,hcp2:pair.hcp2},course,t.scores||{});
    }).filter(Boolean);
  // eslint-disable-next-line
  },[t.pairs,JSON.stringify(t.scores),data.players,course]);

  const teamResults=useMemo(()=>{
    if(!t.teams?.length||!indivResults.length)return[];
    return t.teams.map(team=>{
      const members=indivResults.filter(r=>team.playerIds?.includes(r.playerId));
      const total=members.reduce((a,r)=>a+(r.gross>0?r.modStableford:0),0);
      return{team,members,total};
    }).sort((a,b)=>b.total-a.total);
  },[t.teams,indivResults]);

  const rankBy=(key,hi=true)=>[...indivResults].filter(r=>r.gross>0).sort((a,b)=>hi?b[key]-a[key]:a[key]-b[key]).map((r,i)=>({...r,pos:i+1}));

  const sendWhatsApp=()=>{
    const lines=[`🏌️ *${t.name} — Results*`,`📍 ${course.name}`,``];
    const sf=rankBy("stableford",true);
    if(sf.length){
      lines.push("*🏆 Individual Scores:*");
      // Build combined table: rank, name, SF pts, Mod SF pts, HC
      const nameW=Math.max(...sf.map(r=>r.playerName.length));
      sf.forEach(r=>{
        const msf=rankBy("modStableford",true).find(m=>m.playerId===r.playerId);
        lines.push(`  ${r.pos}. ${r.playerName.padEnd(nameW)} — SF: ${String(r.stableford).padStart(2)} pts | Mod: ${String(r.modStableford).padStart(2)} pts (HC ${r.handicap})`);
      });
      lines.push(``);
    }
    if(pairResults.length){
      lines.push("*⚔️ Ratarata Pairs:*");
      pairResults.forEach((r,i)=>{
        const scoredHoles=r.holes.filter(h=>h.net1!==null);
        const totalNet1=scoredHoles.reduce((a,h)=>a+h.net1,0);
        const totalNet2=scoredHoles.reduce((a,h)=>a+h.net2,0);
        const p1n=r.p1.name.split(" ")[0];
        const p2n=r.p2.name.split(" ")[0];
        const ptsWinner=r.pts1>r.pts2?p1n:r.pts2>r.pts1?p2n:null;
        const ptsDiff=Math.abs(r.pts1-r.pts2);
        const netDiff=Math.abs(totalNet1-totalNet2);
        const ptsPart=ptsWinner?`${ptsWinner} wins by ${ptsDiff} pt${ptsDiff!==1?"s":""}`:null;
        const netPart=netDiff>0?`${netDiff} stroke${netDiff!==1?"s":""}`:null;
        const summary=ptsPart&&netPart?`${ptsPart} and ${netPart}`:ptsPart||"Tied";
        const hcNote=r.hcpDiff>0?` (+${r.hcpDiff} to ${r.hcp1>r.hcp2?p2n:p1n})`:"";
        lines.push(`  Pair ${i+1}: ${r.p1.name} vs ${r.p2.name}${hcNote}`);
        lines.push(`    ${r.pts1} – ${r.pts2} pts | Net: ${totalNet1} – ${totalNet2}`);
        lines.push(`    ${summary}`);
      });
      lines.push(``);
    }
    if(teamResults.length){
      lines.push("*👥 Teams (Mod Stableford):*");
      teamResults.forEach((r,i)=>lines.push(`  ${i+1}. ${r.team.name} — ${r.total} pts`));
    }
    window.open(`https://wa.me/?text=${encodeURIComponent(lines.join("\n"))}`,"_blank");
  };

  const tabs=[
    {id:"individual",label:"All Players"},
    {id:"scorecards",label:`Scorecards (${t.groups?.length||0})`},
    {id:"pairs",label:`Ratarata (${pairResults.length} pairs)`},
    t.teams?.length&&{id:"teams",label:`Teams (${teamResults.length})`},
  ].filter(Boolean);

  return(
    <div>
      <div className="ph">
        <div className="ph-left">
          <h2 style={{display:"flex",alignItems:"center",gap:8}}>
            {isLive&&<span className="live-dot"/>}{t.name}
          </h2>
          <p>{course.name} {isLive?"· Live results":"· Final results"}</p>
        </div>
        <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
          <button className="btn btn-ghost" onClick={onBack}>← All</button>
          <button className="btn btn-ghost btn-sm" onClick={onScoring}>🎯 Scoring</button>
          <button className="btn btn-wa" onClick={sendWhatsApp}>📲 WhatsApp Results</button>
        </div>
      </div>

      <div className="tabs">
        {tabs.map(s=><div key={s.id} className={"tab"+(tab===s.id?" on":"")} onClick={()=>setTab(s.id)}>{s.label}</div>)}
      </div>

      {tab==="individual"&&(
        <div>
          {[
            {key:"stableford",   label:"Stableford",            hi:true,  note:"Higher points wins"},
            {key:"modStableford",label:"Mod Stableford (75%)",  hi:true,  note:"Higher points wins"},
            {key:"strokeNet",    label:"Net Stroke Play",        hi:false, note:"Lower score wins"},
          ].map(fmt=>{
            const ranked=rankBy(fmt.key,fmt.hi);
            if(!ranked.length)return null;
            return(
              <div key={fmt.key} className="card">
                <div className="card-title">{fmt.label} <span style={{fontSize:11,color:"var(--gray-400)",fontWeight:400}}>{fmt.note}</span></div>
                {ranked.map(r=>(
                  <div key={r.playerId} className="lbrow">
                    <div className={"lbpos"+(r.pos===1?" p1":r.pos===2?" p2":r.pos===3?" p3":" pn")}>{r.pos}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:13.5}}>{r.playerName}</div>
                      <div style={{fontSize:11,color:"var(--gray-400)"}}>HC {r.handicap} · Gross {r.gross||"—"}</div>
                    </div>
                    <div style={{fontFamily:"Playfair Display,serif",fontSize:22,fontWeight:700,color:"var(--green)"}}>{r[fmt.key]}</div>
                    {r.pos===1&&<span style={{fontSize:18}}>🏆</span>}
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      )}

      {tab==="scorecards"&&(
        <div>
          {!t.groups?.length
            ?<div className="card"><p style={{fontSize:13,color:"var(--gray-400)"}}>No groups in this tournament.</p></div>
            :t.groups.map((g,gi)=>{
              const players=data.players.filter(p=>g.playerIds?.includes(p.id));
              const locked=(t.lockedCards||[]).includes(g.id);
              const scoringNow=(t.scoringCards||[]).includes(g.id);
              const hasScores=players.some(p=>(t.scores?.[p.id]||[]).some(v=>parseInt(v)>0));
              return(
                <div key={g.id} className="card">
                  <div className="card-title" style={{alignItems:"center",gap:9}}>
                    <span>Group {gi+1}: {players.map(p=>p.name).join(", ")||"Empty"}</span>
                    {locked&&<span className="badge b-green" style={{marginLeft:8}}>✓ Complete</span>}
                    {!locked&&scoringNow&&<span className="badge b-red" style={{marginLeft:8}}>⏳ In Progress</span>}
                    {!locked&&!scoringNow&&!hasScores&&<span className="badge b-gray" style={{marginLeft:8}}>Pending</span>}
                  </div>
                  {hasScores?(
                    <>
                      <ScorecardGrid course={course} players={players} scores={t.scores||{}} setScore={null} locked={true}/>
                      <div style={{marginTop:12,overflowX:"auto"}}>
                        <table className="dt" style={{fontSize:12.5}}>
                          <thead><tr><th>Player</th><th>HC</th><th>Gross</th><th>Stableford</th><th>Mod SF 75%</th><th>Net</th></tr></thead>
                          <tbody>
                            {calcFormats(players.map(p=>({playerId:p.id,playerName:p.name,handicap:p.handicap,scores:t.scores?.[p.id]||Array(18).fill(0)})),course).filter(r=>r.gross>0).map(r=>(
                              <tr key={r.playerId}>
                                <td style={{fontWeight:600}}>{r.playerName}</td>
                                <td>{r.handicap}</td>
                                <td style={{fontWeight:700,color:"var(--green)"}}>{r.gross}</td>
                                <td><span className="badge b-green">{r.stableford}</span></td>
                                <td><span className="badge b-blue">{r.modStableford}</span></td>
                                <td>{r.strokeNet}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </>
                  ):(
                    <p style={{fontSize:12.5,color:"var(--gray-400)",marginTop:8,fontStyle:"italic"}}>No scores entered yet.</p>
                  )}
                </div>
              );
            })
          }
        </div>
      )}

      {tab==="pairs"&&(
        <div>
          {!pairResults.length
            ?<div className="card"><p style={{fontSize:13,color:"var(--gray-400)"}}>No pairs set up — add them in Tournament Setup.</p></div>
            :pairResults.map((r,i)=>(
              <div key={i} className="card">{(()=>{
                const scoredHoles=r.holes.filter(h=>h.net1!==null);
                const totalNet1=scoredHoles.reduce((a,h)=>a+h.net1,0);
                const totalNet2=scoredHoles.reduce((a,h)=>a+h.net2,0);
                const p1n=r.p1.name.split(" ")[0];
                const p2n=r.p2.name.split(" ")[0];
                const ptsWinner=r.pts1>r.pts2?p1n:r.pts2>r.pts1?p2n:null;
                const ptsDiff=Math.abs(r.pts1-r.pts2);
                const netWinner=totalNet1<totalNet2?p1n:totalNet2<totalNet1?p2n:null;
                const netDiff=Math.abs(totalNet1-totalNet2);
                const ptsPart=ptsWinner?`${ptsWinner} wins by ${ptsDiff} point${ptsDiff!==1?"s":""}`:null;
                const netPart=netWinner?`${netDiff} stroke${netDiff!==1?"s":""}`:null;
                const summary=ptsPart&&netPart?`${ptsPart} and ${netPart}`:ptsPart||netPart||null;
                return(<>
                <div className="card-title">
                  Pair {i+1}
                  {r.hcpDiff>0?<span style={{fontSize:11,fontWeight:400,color:"var(--gray-400)",marginLeft:8}}>({r.hcp1>r.hcp2?r.p1.name:r.p2.name} +{r.hcpDiff})</span>:null}
                </div>
                {/* Always-visible summary */}
                <div style={{marginBottom:10,padding:"8px 10px",background:summary?"#f0faf4":"var(--gray-100)",borderRadius:7,textAlign:"center"}}>
                  {summary
                    ?<span style={{fontSize:13,fontWeight:700,color:"var(--green)"}}>🏆 {summary}</span>
                    :<span style={{fontSize:13,color:"var(--gray-400)",fontStyle:"italic"}}>Match tied — {r.pts1} pts each</span>
                  }
                </div>
                {/* Expandable hole-by-hole toggle */}
                <button onClick={()=>togglePair(i)} style={{width:"100%",background:"var(--gray-100)",border:"none",borderRadius:6,padding:"5px 10px",fontSize:11,fontWeight:600,color:"var(--gray-500)",cursor:"pointer",textAlign:"center",marginBottom:8}}>
                  {expandedPairs.has(i)?"▲ Hide hole detail":"▼ Show hole by hole"}
                </button>
                {/* Hole-by-hole breakdown */}
                {expandedPairs.has(i)&&(
                  <div style={{overflowX:"auto",marginBottom:4}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                      <thead>
                        <tr style={{background:"var(--green)",color:"white"}}>
                          <th style={{padding:"4px 5px",textAlign:"center"}}>Hole</th>
                          <th style={{padding:"4px 5px",textAlign:"center"}}>SI</th>
                          <th style={{padding:"4px 5px",textAlign:"center"}}>Par</th>
                          <th style={{padding:"4px 5px",textAlign:"center"}}>{p1n}</th>
                          <th style={{padding:"4px 5px",textAlign:"center"}}>{p2n}</th>
                          <th style={{padding:"4px 5px",textAlign:"center"}}>Allow</th>
                          <th style={{padding:"4px 5px",textAlign:"center",color:"#a8ffc4"}}>{p1n} Pts</th>
                          <th style={{padding:"4px 5px",textAlign:"center",color:"#a8ffc4"}}>{p2n} Pts</th>
                          <th style={{padding:"4px 5px",textAlign:"center",color:"#ffd580"}}>{p1n} Net</th>
                          <th style={{padding:"4px 5px",textAlign:"center",color:"#ffd580"}}>{p2n} Net</th>
                        </tr>
                      </thead>
                      <tbody>
                        {r.holes.map((h,hi)=>{
                          const scored=h.g1!==null&&h.g2!==null;
                          const rowBg=hi%2===0?"#fafafa":"white";
                          const p1wins=scored&&h.holeDiff>0;
                          const p2wins=scored&&h.holeDiff<0;
                          return(
                            <tr key={hi} style={{background:rowBg}}>
                              <td style={{padding:"3px 5px",textAlign:"center",fontWeight:700}}>{h.hole}</td>
                              <td style={{padding:"3px 5px",textAlign:"center",color:"var(--gray-400)",fontSize:10}}>{h.si}</td>
                              <td style={{padding:"3px 5px",textAlign:"center"}}>{h.par}</td>
                              <td style={{padding:"3px 5px",textAlign:"center",fontWeight:p1wins?700:400,color:p1wins?"var(--green)":"inherit"}}>{h.g1??""}</td>
                              <td style={{padding:"3px 5px",textAlign:"center",fontWeight:p2wins?700:400,color:p2wins?"var(--green)":"inherit"}}>{h.g2??""}</td>
                              <td style={{padding:"3px 5px",textAlign:"center",color:"var(--gray-400)",fontSize:10}}>{scored?(h.allow>0?"+1":"·"):""}</td>
                              <td style={{padding:"3px 5px",textAlign:"center",fontWeight:700,color:p1wins?"var(--green)":"var(--gray-300)"}}>{scored?(p1wins?h.sf1:"—"):""}</td>
                              <td style={{padding:"3px 5px",textAlign:"center",fontWeight:700,color:p2wins?"var(--green)":"var(--gray-300)"}}>{scored?(p2wins?h.sf2:"—"):""}</td>
                              <td style={{padding:"3px 5px",textAlign:"center",color:"var(--gray-600)",fontSize:10}}>{scored?h.net1:""}</td>
                              <td style={{padding:"3px 5px",textAlign:"center",color:"var(--gray-600)",fontSize:10}}>{scored?h.net2:""}</td>
                            </tr>
                          );
                        })}
                        <tr style={{background:"#1a4731",color:"white",fontWeight:700,fontSize:11}}>
                          <td colSpan={6} style={{padding:"5px 6px",textAlign:"right",letterSpacing:.5}}>TOTAL</td>
                          <td style={{padding:"5px 6px",textAlign:"center",color:"#a8ffc4"}}>{r.pts1}</td>
                          <td style={{padding:"5px 6px",textAlign:"center",color:"#a8ffc4"}}>{r.pts2}</td>
                          <td style={{padding:"5px 6px",textAlign:"center",color:"#ffd580"}}>{totalNet1}</td>
                          <td style={{padding:"5px 6px",textAlign:"center",color:"#ffd580"}}>{totalNet2}</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                )}
                </>);
              })()}</div>
            ))
          }
        </div>
      )}

      {tab==="teams"&&(
        <div>
          {!teamResults.length
            ?<div className="card"><p style={{fontSize:13,color:"var(--gray-400)"}}>No teams set up.</p></div>
            :teamResults.map((r,i)=>(
              <div key={r.team.id} className="card">
                <div className="card-title">
                  {i===0?"🏆 ":""}{r.team.name} — <span className="badge b-green">{r.total} pts</span>
                  <span style={{fontSize:11,color:"var(--gray-400)",fontWeight:400,marginLeft:8}}>Modified Stableford (75% HC)</span>
                </div>
                {r.members.map(m=>(
                  <div key={m.playerId} className="lbrow">
                    <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{m.playerName}</div><div style={{fontSize:11,color:"var(--gray-400)"}}>HC {m.handicap}</div></div>
                    <div style={{fontWeight:700,color:"var(--green)",fontSize:14}}>{m.gross>0?m.modStableford:"—"} pts</div>
                  </div>
                ))}
              </div>
            ))
          }
        </div>
      )}
    </div>
  );
}

// ── Standalone Scorecard Page ─────────────────────────────────────────────────
function ScorecardPage({data,url,refresh}){
  const [cid,setCid]=useState(()=>data.courses[0]?.id||null);
  const [sel,setSel]=useState([]);
  const [scores,setScores]=useState({});
  const [done,setDone]=useState(false);
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState(null);
  const course=data.courses.find(c=>String(c.id)===String(cid));
  const N=(t,tp="ok")=>{setMsg({t,tp});setTimeout(()=>setMsg(null),4000);};

  const toggle=p=>{
    if(sel.find(x=>x.id===p.id)){setSel(sel.filter(x=>x.id!==p.id));}
    else if(sel.length<4){setSel([...sel,p]);if(!scores[p.id])setScores(s=>({...s,[p.id]:Array(18).fill("")}));}
    else N("Max 4 players per scorecard","warn");
  };
  const setScore=(pid,h,v)=>setScores(s=>({...s,[pid]:s[pid].map((x,i)=>i===h?v:x)}));

  const submit=async()=>{
    if(!course||!sel.length)return N("Select a course and at least one player","error");
    setBusy(true);
    try{
      const date=new Date().toISOString().split("T")[0];
      const results=calcFormats(sel.map(p=>({playerId:p.id,playerName:p.name,handicap:p.handicap,scores:scores[p.id]||Array(18).fill(0)})),course);
      if(url){await apiPost(url,"addScores",results.map(r=>({...r,date,courseId:course.id,courseName:course.name,tournament:"",scores:scores[r.playerId]||Array(18).fill(0)})));await refresh();N("Saved to Google Sheet ✓");}
      else N("Saved locally (not connected to Sheet)","warn");
      setDone(true);
    }catch(e){N("Error: "+e.message,"error");}
    setBusy(false);
  };

  if(!data.courses.length)return(
    <div><div className="ph"><div className="ph-left"><h2>Scorecard</h2><p>Add a course first</p></div></div>
      <div className="card"><p style={{color:"var(--gray-400)",fontSize:13}}>No courses available. Add one in the Courses tab.</p></div>
    </div>
  );

  return(
    <div>
      <div className="ph"><div className="ph-left"><h2>Scorecard</h2><p>Standalone scorecard — not linked to any tournament</p></div></div>
      {msg&&<Alrt type={msg.tp} msg={msg.t} onClose={()=>setMsg(null)}/>}
      <div className="card">
        <div className="card-title">Setup</div>
        <div className="ff" style={{marginBottom:14}}><label>Course</label>
          <select value={cid||""} onChange={e=>{setCid(e.target.value);setDone(false);}}>
            {data.courses.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>
        <div className="section-title">Players (max 4)</div>
        <div className="psel">
          {data.players.map(p=>(
            <div key={p.id} className={"pchip"+(sel.find(x=>x.id===p.id)?" on":"")} onClick={()=>toggle(p)}>
              <span>{sel.find(x=>x.id===p.id)?"✓":"○"}</span>
              <span style={{flex:1}}>{p.name}</span><span className="hc">{p.handicap}</span>
            </div>
          ))}
        </div>
      </div>
      {sel.length>0&&course&&(
        <div className="card">
          <div className="card-title">{course.name}</div>
          <ScorecardGrid course={course} players={sel} scores={scores} setScore={setScore} locked={done}/>
          {!done
            ?<div className="btn-row"><button className="btn btn-primary" onClick={submit} disabled={busy}>{busy?<><Spin/>Saving…</>:"Submit Scores"}</button></div>
            :<div className="alert alert-ok" style={{marginTop:12}}>✓ Submitted! <button className="btn btn-sm btn-ghost" style={{marginLeft:9}} onClick={()=>{setDone(false);setSel([]);setScores({});}}>New Card</button></div>
          }
        </div>
      )}
    </div>
  );
}

// ── App Shell ─────────────────────────────────────────────────────────────────
const NAV=[
  {id:"players",    ico:"👤", label:"Players"},
  {id:"courses",    ico:"⛳", label:"Courses"},
  {id:"scorecard",  ico:"📋", label:"Scorecard"},
  {id:"tournaments",ico:"🏆", label:"Tournaments"},
  {id:"setup",      ico:"⚙️",  label:"Setup"},
];

function App(){
  const [page,setPage]=useState(()=>{
    // Has saved URL, or arriving via shared #url= link -> go to tournaments
    const hasUrl=localStorage.getItem(LS_URL);
    const hasHash=window.location.hash&&window.location.hash.includes("url=");
    return (hasUrl||hasHash)?"tournaments":"setup";
  });
  const [url,setUrl]=useState(()=>{
    // Check URL hash for shared link: #url=GAS_URL
    try{
      const h=decodeURIComponent(window.location.hash||"");
      const m=h.match(/[#&]url=([^&]+)/);
      if(m&&m[1]){
        const sharedUrl=m[1];
        localStorage.setItem(LS_URL,sharedUrl);
        // Clean the hash so it's not visible
        history.replaceState(null,"",window.location.pathname+window.location.search);
        return sharedUrl;
      }
    }catch(_){}
    return localStorage.getItem(LS_URL)||"";
  });
  const [data,setData]=useState(()=>{try{const c=localStorage.getItem(LS_DATA);return c?JSON.parse(c):DEFAULT_DATA;}catch{return DEFAULT_DATA;}});
  const [status,setStatus]=useState(()=>{
    const u=localStorage.getItem(LS_URL);
    if(!u)return"none";
    // If we have a previously successful connection, start as ok (sync in background)
    return localStorage.getItem("llg_connected")?"ok":"busy";
  });
  const [admin,setAdmin]=useState(()=>localStorage.getItem(LS_AUTH)||null);
  const [showLogin,setShowLogin]=useState(false);

  const testAndLoad=useCallback(async(u)=>{
    if(!u)return;setStatus("busy");
    try{
      const r=await apiGet(u,"getAll");
      const merged={players:r.players?.length?r.players:data.players,courses:r.courses?.length?r.courses:data.courses,scores:r.scores||[],tournaments:r.tournaments||[]};
      setData(merged);localStorage.setItem(LS_DATA,JSON.stringify(merged));
      localStorage.setItem("llg_connected","1");setStatus("ok");
    }catch(e){console.error(e);setStatus("err");}
  },[]);

  const refresh=useCallback(async()=>{
    if(!url)return;setStatus("busy");
    try{
      const r=await apiGet(url,"getAll");
      const merged={players:r.players?.length?r.players:data.players,courses:r.courses?.length?r.courses:data.courses,scores:r.scores||[],tournaments:r.tournaments||[]};
      setData(merged);localStorage.setItem(LS_DATA,JSON.stringify(merged));
      localStorage.setItem("llg_connected","1");setStatus("ok");
    }catch(e){setStatus("err");}
  },[url]);

  useEffect(()=>{if(url)testAndLoad(url);},[]);

  const navClick=(id)=>{
    if(id==="setup"){
      if(admin)setPage("setup");
      else setShowLogin(true);
    }else{
      setPage(id);
    }
  };

  const sc=status==="ok"?"sync-ok":status==="err"?"sync-err":status==="busy"?"sync-busy":"sync-none";
  const dc=status==="ok"?"dot-ok":status==="err"?"dot-err":status==="busy"?"dot-busy":"dot-none";

  return(
    <div className="app">
      {showLogin&&<LoginModal onLogin={(e)=>{setAdmin(e);localStorage.setItem(LS_AUTH,e);setShowLogin(false);setPage("setup");}} onCancel={()=>setShowLogin(false)}/>}
      <nav className="sidebar">
        <div className="sidebar-logo" onClick={()=>setPage("players")}>
          <img src={LOGO_SRC} alt="Lucky Last Golfers"/>
          <div className="sidebar-logo-text">
            <h1>Lucky Last Golfers</h1>
            <p>EST. 2024</p>
          </div>
        </div>
        <div className={"sync-pill "+sc}>
          <div className={"dot "+dc}/>
          <span>{status==="ok"?"Synced":status==="busy"?"Syncing…":"Not synced"}</span>
        </div>
        <div className="nav-section">
          <div className="nav-label">Navigation</div>
          {NAV.map(n=>(
            <div key={n.id} className={"nav-item"+(page===n.id?" active":"")} onClick={()=>navClick(n.id)}>
              <span className="ico">{n.ico}</span><span>{n.label}</span>
            </div>
          ))}
        </div>
      </nav>
      <main className="content">
        {!url&&page!=="setup"&&(
          <div className="alert alert-info" style={{marginBottom:14}}>
            ℹ️ Connect to Google Sheets to sync data.{" "}
            <span style={{cursor:"pointer",textDecoration:"underline",fontWeight:700}} onClick={()=>navClick("setup")}>Set up →</span>
          </div>
        )}
        {url&&status==="err"&&page!=="setup"&&(
          <div className="alert alert-warn" style={{marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
            <span>⚠️ Could not sync — showing cached data</span>
            <button className="btn btn-sm btn-ghost" style={{flexShrink:0}} onClick={()=>testAndLoad(url)}>↻ Retry</button>
          </div>
        )}
        {page==="players"    &&<PlayersPage    data={data} url={url} refresh={refresh} setData={setData}/>}
        {page==="courses"    &&<CoursesPage    data={data} url={url} refresh={refresh} setData={setData}/>}
        {page==="scorecard"  &&<ScorecardPage  data={data} url={url} refresh={refresh}/>}
        {page==="tournaments"&&<TournamentPage data={data} url={url} refresh={refresh}/>}
        {page==="setup"      &&<SetupPage      url={url} setUrl={setUrl} onTest={testAndLoad} status={status} admin={admin} onLogout={()=>{setAdmin(null);localStorage.removeItem(LS_AUTH);setPage("players");}}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
