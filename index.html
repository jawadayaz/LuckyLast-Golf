<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --green:#1a4731;--green-mid:#2d6a4f;--green-light:#52b788;
  --gold:#c9981a;--gold-light:#f0c040;
  --cream:#faf8f2;--gray-50:#f9f9f6;--gray-100:#f2f0e8;--gray-200:#e4e1d6;
  --gray-400:#9c9888;--gray-600:#5c5a50;--gray-800:#2c2a20;
  --red:#c0392b;--blue:#1565c0;--purple:#6a1b9a;--teal:#00695c;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--gray-800);min-height:100vh;}
.app{display:flex;min-height:100vh;}

/* ── Sidebar ── */
.sidebar{width:230px;background:var(--green);flex-shrink:0;display:flex;flex-direction:column;}
.sidebar-logo{padding:16px 14px 14px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px;cursor:pointer;transition:opacity .15s;}
.sidebar-logo:hover{opacity:.9;}
.sidebar-logo img{width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid var(--gold-light);flex-shrink:0;}
.sidebar-logo-text h1{font-family:'Playfair Display',serif;font-size:13.5px;font-weight:900;color:var(--gold-light);line-height:1.25;}
.sidebar-logo-text p{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:1.8px;text-transform:uppercase;margin-top:2px;}
.sync-pill{margin:8px 12px;padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:6px;}
.sync-ok{background:rgba(82,183,136,.18);color:#6fcfa0;}
.sync-err{background:rgba(192,57,43,.18);color:#e57373;}
.sync-busy{background:rgba(240,192,64,.18);color:var(--gold-light);}
.sync-none{background:rgba(255,255,255,.07);color:rgba(255,255,255,.4);}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dot-ok{background:#6fcfa0;}.dot-err{background:#e57373;}
.dot-busy{background:var(--gold-light);animation:pulse .9s infinite;}
.dot-none{background:rgba(255,255,255,.25);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav-section{padding:10px 0 4px;}
.nav-label{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.28);padding:0 16px;margin-bottom:3px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,.68);transition:all .15s;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.9);}
.nav-item.active{background:rgba(255,255,255,.1);color:var(--gold-light);border-left-color:var(--gold-light);}
.nav-item .ico{width:16px;text-align:center;font-size:14px;}

/* ── Main content ── */
.content{flex:1;padding:28px 32px;min-width:0;}
.ph{margin-bottom:22px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.ph-left h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--green);}
.ph-left p{font-size:12.5px;color:var(--gray-400);margin-top:3px;}

/* ── Cards ── */
.card{background:white;border-radius:12px;padding:20px;border:1px solid var(--gray-200);margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.card-title{font-family:'Playfair Display',serif;font-size:15px;color:var(--green);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--gray-100);display:flex;justify-content:space-between;align-items:center;}

/* ── Tables ── */
.dt{width:100%;border-collapse:collapse;font-size:13px;}
.dt th{background:var(--green);color:white;padding:8px 12px;text-align:left;font-weight:600;font-size:11px;letter-spacing:.5px;text-transform:uppercase;}
.dt th:first-child{border-radius:7px 0 0 0;}.dt th:last-child{border-radius:0 7px 0 0;}
.dt td{padding:9px 12px;border-bottom:1px solid var(--gray-100);color:var(--gray-600);vertical-align:middle;}
.dt tr:hover td{background:var(--gray-50);}

/* ── Buttons ── */
.btn{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--green);color:white;}.btn-primary:not(:disabled):hover{background:var(--green-mid);}
.btn-gold{background:var(--gold);color:white;}.btn-gold:not(:disabled):hover{background:#a87c10;}
.btn-blue{background:var(--blue);color:white;}.btn-blue:not(:disabled):hover{background:#0d47a1;}
.btn-ghost{background:transparent;border:1.5px solid var(--gray-200);color:var(--gray-600);}.btn-ghost:not(:disabled):hover{border-color:var(--green);color:var(--green);}
.btn-danger{background:transparent;border:1.5px solid var(--red);color:var(--red);}.btn-danger:not(:disabled):hover{background:var(--red);color:white;}
.btn-wa{background:#25D366;color:white;font-weight:700;}.btn-wa:not(:disabled):hover{background:#1aad54;}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:6px;}
.btn-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px;}

/* ── Forms ── */
.fg{display:grid;gap:12px;}
.fg2{grid-template-columns:1fr 1fr;}.fg3{grid-template-columns:1fr 1fr 1fr;}.fg4{grid-template-columns:1fr 1fr 1fr 1fr;}
.ff label{display:block;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--gray-600);margin-bottom:4px;}
.ff input,.ff select{width:100%;padding:7px 10px;border:1.5px solid var(--gray-200);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--gray-800);background:white;outline:none;transition:border-color .15s;}
.ff input:focus,.ff select:focus{border-color:var(--green-light);}

/* ── Alerts ── */
.alert{padding:9px 13px;border-radius:8px;font-size:13px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px;line-height:1.5;}
.alert-ok{background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9;}
.alert-err{background:#ffebee;color:var(--red);border:1px solid #ffcdd2;}
.alert-info{background:#e3f2fd;color:var(--blue);border:1px solid #bbdefb;}
.alert-warn{background:#fff8e1;color:#7c5a00;border:1px solid #ffe082;}
.alert .cls{margin-left:auto;cursor:pointer;font-size:15px;opacity:.55;flex-shrink:0;line-height:1;}
.alert .cls:hover{opacity:1;}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
/* ── Confirm Dialog ── */
.cdlg-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px);}
.cdlg{background:#fff;border-radius:16px;padding:28px 24px 20px;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:cdlg-in .18s ease;}
@keyframes cdlg-in{from{opacity:0;transform:scale(.93) translateY(8px)}to{opacity:1;transform:none}}
.cdlg-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 14px;}
.cdlg-icon.danger{background:#ffebee;}
.cdlg-icon.warn{background:#fff8e1;}
.cdlg-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--gray-800);text-align:center;margin-bottom:8px;}
.cdlg-msg{font-size:13.5px;color:var(--gray-600);text-align:center;line-height:1.55;margin-bottom:22px;}
.cdlg-btns{display:flex;gap:10px;}
.cdlg-btns button{flex:1;padding:11px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:opacity .15s;}
.cdlg-btns button:hover{opacity:.88;}
.cdlg-cancel{background:var(--gray-100);color:var(--gray-600);}
.cdlg-ok{background:var(--red);color:#fff;}
.cdlg-ok.safe{background:var(--green);color:#fff;}
.b-green{background:#e8f5e9;color:#2e7d32;}.b-blue{background:#e3f2fd;color:var(--blue);}
.b-gold{background:#fff8e1;color:#8a6200;}.b-red{background:#ffebee;color:var(--red);}
.b-purple{background:#f3e5f5;color:var(--purple);}.b-teal{background:#e0f2f1;color:var(--teal);}
.b-gray{background:var(--gray-100);color:var(--gray-600);}

/* ── Scorecard ── */
.sct{width:100%;border-collapse:collapse;font-size:12px;}
.sct th{background:var(--green);color:white;padding:6px 4px;text-align:center;font-size:10.5px;}
.sct td{padding:3px;text-align:center;border:1px solid var(--gray-200);}
.sct .pr td{background:#e8f5e9;font-weight:700;color:var(--green);}
.sct .sr td{background:#fff8e1;color:var(--gray-600);}
.si{width:40px;padding:3px 1px;text-align:center;border:1.5px solid var(--gray-200);border-radius:4px;font-size:13px;font-weight:700;background:white;font-family:'DM Sans',sans-serif;}
.si:focus{border-color:var(--green-light);outline:none;}
.si:disabled{background:var(--gray-100);color:var(--gray-600);}
.eagle{border-color:#1565c0!important;background:#e3f2fd!important;color:#1565c0!important;}
.birdie{border-color:#2e7d32!important;background:#e8f5e9!important;color:#2e7d32!important;}
.par{}.bogey{border-color:#e65100!important;color:#e65100!important;}
.double{border-color:var(--red)!important;color:var(--red)!important;}
.triple{background:var(--red)!important;color:white!important;border-color:var(--red)!important;}

/* ── Player chips ── */
.psel{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:7px;margin-top:8px;}
.pchip{display:flex;align-items:center;gap:6px;padding:7px 10px;border:1.5px solid var(--gray-200);border-radius:8px;cursor:pointer;font-size:12.5px;transition:all .15s;background:white;user-select:none;}
.pchip:hover{border-color:var(--green-light);}
.pchip.on{border-color:var(--green);background:#e8f5e9;color:var(--green);}
.pchip.on .hc{color:#2e7d32;}
.pchip.disabled{opacity:.38;cursor:not-allowed;background:var(--gray-100);}
.pchip .hc{margin-left:auto;font-size:11px;color:var(--gray-400);font-weight:700;}

/* ── Tabs ── */
.tabs{display:flex;gap:3px;background:var(--gray-100);padding:3px;border-radius:9px;margin-bottom:16px;flex-wrap:wrap;width:fit-content;}
.tab{padding:6px 13px;border-radius:7px;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--gray-600);transition:all .15s;white-space:nowrap;}
.tab.on{background:white;color:var(--green);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.08);}

/* ── Hole grid ── */
.hg{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;}
.hc2{text-align:center;}
.hc2 label{font-size:9px;color:var(--gray-400);display:block;margin-bottom:2px;font-weight:600;}
.hc2 input{width:100%;padding:3px 1px;text-align:center;border:1.5px solid var(--gray-200);border-radius:5px;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;}
.hc2 input:focus{border-color:var(--green-light);outline:none;}
.hl{font-size:10.5px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}

/* ── Leaderboard ── */
.lbrow{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--gray-100);}
.lbrow:last-child{border-bottom:none;}
.lbpos{width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;}
.p1{background:var(--gold-light);color:#5a3e00;}
.p2{background:#e8e8e8;color:#444;}
.p3{background:#ffe0cc;color:#7a3200;}
.pn{background:var(--gray-100);color:var(--gray-600);}

/* ── Pair cards ── */
.pair-card{border:1.5px solid var(--gray-200);border-radius:9px;padding:13px;margin-bottom:9px;background:white;transition:border-color .15s;}
.pair-card:focus-within{border-color:var(--green-light);}

/* ── Group cards ── */
.group-card{border:1.5px solid var(--gray-200);border-radius:9px;padding:13px;margin-bottom:10px;background:white;}
.group-card.locked{border-color:#2e7d32;background:#f0faf3;}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px);}
.modal{background:white;border-radius:14px;padding:26px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.25);}
.modal-title{font-family:'Playfair Display',serif;font-size:21px;color:var(--green);margin-bottom:18px;}

/* ── Misc ── */
.divider{height:1px;background:var(--gray-200);margin:14px 0;}
.section-title{font-size:11px;font-weight:700;color:var(--gray-600);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;}
.warn-box{background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:10px 13px;font-size:12px;color:#7c5a00;margin-top:8px;line-height:1.6;}
.code-block{background:#1a1a2e;color:#a8d8a8;padding:12px 14px;border-radius:8px;font-size:10.5px;font-family:'Courier New',monospace;line-height:1.65;white-space:pre-wrap;word-break:break-all;max-height:180px;overflow-y:auto;}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;}
.spinner-dark{border-color:rgba(0,0,0,.15);border-top-color:var(--gray-600);}
@keyframes spin{to{transform:rotate(360deg)}}
.live-dot{display:inline-block;width:8px;height:8px;background:#e53935;border-radius:50%;animation:pulse .9s infinite;margin-right:5px;}
.setup-step{display:flex;gap:14px;margin-bottom:20px;}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--green);color:white;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-body{}
.step-title{font-weight:700;font-size:13.5px;color:var(--green);margin-bottom:3px;}
.step-desc{font-size:12.5px;color:var(--gray-600);line-height:1.6;margin-bottom:8px;}
@media(min-width:769px){.sidebar{position:sticky;top:0;height:100vh;overflow-y:auto;}}
@media(max-width:768px){
  /* App layout: stack vertically, sidebar becomes bottom tab bar */
  .app{
    display:flex;
    flex-direction:column;
    min-height:100vh;
    min-height:100dvh;
  }
  /* Sidebar: fixed bottom tab bar, full width, no height in flow */
  .sidebar{
    order:2;
    width:100%;
    height:auto;
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    top:auto;
    z-index:200;
    flex-direction:row;
    overflow:hidden;
    padding-bottom:env(safe-area-inset-bottom,0);
    box-shadow:0 -2px 12px rgba(0,0,0,.18);
  }
  .sidebar-logo{display:none;}
  .sync-pill{display:none;}
  .nav-section{
    display:flex;
    flex-direction:row;
    width:100%;
    padding:0;
  }
  .nav-label{display:none;}
  .nav-item{
    flex:1;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:7px 2px calc(7px + env(safe-area-inset-bottom,0));
    font-size:9px;
    gap:2px;
    border-left:none!important;
    border-top:2px solid transparent;
    min-width:0;
    white-space:nowrap;
  }
  .nav-item.active{border-top-color:var(--gold-light);background:rgba(255,255,255,.08);}
  .nav-item .ico{font-size:20px;width:auto;line-height:1;}
  /* Content: full width, padded for bottom bar */
  .content{
    order:1;
    width:100%;
    min-width:0;
    padding:14px 14px calc(72px + env(safe-area-inset-bottom,0));
    min-height:100vh;
    flex:1;
  }
  .fg2,.fg3,.fg4{grid-template-columns:1fr;}
  .ph{flex-direction:column;gap:10px;}
  .ph>div:last-child{display:flex;flex-wrap:wrap;gap:6px;}
  /* Tables: allow horizontal scroll */
  .dt{font-size:12px;}
  /* Cards: tighter padding */
  .card{padding:14px 12px;}
  /* Scorecard grid: smaller cells on mobile */
  .hg{gap:4px;}
  .hc2{min-width:32px;}
  .hc2 input{width:34px;font-size:12px;padding:3px 2px;}
}

</style>

const DEFAULT_DATA = {players:[],courses:[],scores:[],tournaments:[]};

// ── API ───────────────────────────────────────────────────────────────────────
function jsonpGet(url,action){
  return new Promise((resolve,reject)=>{
    const cb="_llg"+Date.now()+Math.random().toString(36).slice(2);
    const s=document.createElement("script");let done=false;
    const clean=()=>{if(done)return;done=true;clearTimeout(t);delete window[cb];s.parentNode&&s.parentNode.removeChild(s);};
    const t=setTimeout(()=>{clean();reject(new Error("Timed out — check 'Anyone' access"));},15000);
    window[cb]=(d)=>{clean();d&&d.error?reject(new Error(d.error)):resolve(d);};
    s.onerror=()=>{clean();reject(new Error("Script load failed"));};
    s.src=url+"?action="+action+"&callback="+cb;
    document.head.appendChild(s);
  });
}
async function fetchGet(url,action){
  const r=await fetch(url+"?action="+action,{redirect:"follow"});
  if(!r.ok)throw new Error("HTTP "+r.status);
  const txt=await r.text();
  try{const j=JSON.parse(txt);if(j.error)throw new Error(j.error);return j;}
  catch(e){throw new Error("Non-JSON: "+txt.slice(0,120));}
}
async function apiGet(url,action){
  try{return await fetchGet(url,action);}
  catch(e1){try{return await jsonpGet(url,action);}catch(e2){throw new Error(e2.message);}}
}
async function apiPost(url,action,data){
  await fetch(url,{method:"POST",mode:"no-cors",body:JSON.stringify({action,data})});
  await new Promise(r=>setTimeout(r,2000));
}

// ── Scoring ───────────────────────────────────────────────────────────────────
function sa(hcp,si){const h=Math.round(hcp);return Math.floor(h/18)+(si<=(h%18)?1:0);}
function sfPts(gross,par,allow){return Math.max(0,par-(gross-allow)+2);}
function calcFormats(players,course){
  return players.map(({playerId,playerName,handicap,scores:sc})=>{
    let sf=0,msf=0,net=0,mnet=0,gross=0;
    const hSf=[],hMsf=[];
    course.holes.forEach((h,i)=>{
      const g=parseInt(sc[i])||0;
      if(!g){hSf.push(0);hMsf.push(0);return;}
      gross+=g;
      const a=sa(handicap,h.si),a75=sa(Math.round(handicap*.75),h.si);
      const pts=sfPts(g,h.par,a),pts75=sfPts(g,h.par,a75);
      sf+=pts;msf+=pts75;net+=g-a;mnet+=Math.min(g-a,h.par+3);
      hSf.push(pts);hMsf.push(pts75);
    });
    return{playerId,playerName,handicap,gross,stableford:sf,modStableford:msf,strokeNet:net,modStroke:mnet,hSf,hMsf};
  });
}
function calcPair(pair,course,scores){
  const p1=pair.p1,p2=pair.p2;
  const hcp1=pair.hcp1!=null?parseFloat(pair.hcp1):p1.handicap;
  const hcp2=pair.hcp2!=null?parseFloat(pair.hcp2):p2.handicap;
  const hcpDiff=Math.round(Math.abs(hcp1-hcp2));
  let pts1=0,pts2=0,mnet1=0,mnet2=0;
  let holesPlayed=0,p1Holes=0,p2Holes=0;
  const holes=course.holes.map((h,i)=>{
    const g1=parseInt((scores[p1.id]||[])[i])||0;
    const g2=parseInt((scores[p2.id]||[])[i])||0;
    if(g1){p1Holes++;mnet1+=Math.min(g1-sa(hcp1,h.si),h.par+3);}
    if(g2){p2Holes++;mnet2+=Math.min(g2-sa(hcp2,h.si),h.par+3);}
    if(!g1||!g2)return{hole:i+1,si:h.si,par:h.par,g1:g1||null,g2:g2||null,allow:null,sf1:null,sf2:null,holeDiff:null,net1:null,net2:null};
    holesPlayed++;
    const allow1=hcp1>=hcp2?sa(hcpDiff,h.si):0;
    const allow2=hcp2>hcp1?sa(hcpDiff,h.si):0;
    const sf1=sfPts(g1,h.par,allow1);
    const sf2=sfPts(g2,h.par,allow2);
    const holeDiff=sf1-sf2;
    if(sf1>sf2)pts1+=sf1;
    else if(sf2>sf1)pts2+=sf2;
    // net strokes using HC diff allowance, capped at par+3 (net triple bogey)
    const net1=Math.min(g1-allow1,h.par+3);
    const net2=Math.min(g2-allow2,h.par+3);
    const allow=hcp1>=hcp2?allow1:allow2;
    return{hole:i+1,si:h.si,par:h.par,g1,g2,allow,sf1,sf2,holeDiff,net1,net2};
  });
  const mnetDiff=mnet1-mnet2;
  return{p1,p2,hcp1,hcp2,hcpDiff,pts1,pts2,mnet1,mnet2,mnetDiff,holesPlayed,p1Holes,p2Holes,holes,winner:pts1>pts2?p1:pts2>pts1?p2:null};
}

// ── GAS Code ──────────────────────────────────────────────────────────────────
const GAS=`// Lucky Last Golfers — Google Apps Script
// Extensions → Apps Script → paste all → Save → Deploy → New deployment
// Web app | Execute as: Me | Who has access: Anyone

function cr(d,cb){if(cb)return ContentService.createTextOutput(cb+"("+JSON.stringify(d)+")").setMimeType(ContentService.MimeType.JAVASCRIPT);return ContentService.createTextOutput(JSON.stringify(d)).setMimeType(ContentService.MimeType.JSON);}
function doGet(e){var a=e.parameter.action,cb=e.parameter.callback||null;try{if(a==="getAll")return cr(getAll(),cb);if(a==="getAdmins")return cr(getAdmins(),cb);if(a==="getScorecardResult")return cr(getScorecardResult(e.parameter.token||""),cb);return cr({error:"Unknown: "+a},cb);}catch(err){return cr({error:err.toString()},cb);}}
function doPost(e){try{var p=JSON.parse(e.postData.contents);if(p.action==="addPlayer")return cr(addPlayer(p.data));if(p.action==="updatePlayer")return cr(updatePlayer(p.data));if(p.action==="deletePlayer")return cr(deleteRow("Players",p.data.id));if(p.action==="addCourse")return cr(addCourse(p.data));if(p.action==="updateCourse")return cr(updateCourse(p.data));if(p.action==="deleteCourse")return cr(deleteRow("Courses",p.data.id));if(p.action==="addScores")return cr(addScores(p.data));
if(p.action==="saveTournaments")return cr(saveTournaments(p.data));if(p.action==="extractScorecard"){var r=extractScorecard(p.data);if(p.data.token){CacheService.getScriptCache().put(p.data.token,JSON.stringify(r),120);}return cr(r);}return cr({error:"Unknown: "+p.action});}catch(err){return cr({error:err.toString()});}}
function sheet(n,h){var ss=SpreadsheetApp.getActiveSpreadsheet(),s=ss.getSheetByName(n);if(!s){s=ss.insertSheet(n);s.appendRow(h);s.getRange(1,1,1,h.length).setBackground("#1a4731").setFontColor("#fff").setFontWeight("bold");}return s;}
function PS(){return sheet("Players",["ID","Name","Email","Handicap"]);}
function CS(){var h=[];for(var i=1;i<=18;i++)h.push("H"+i+"_Par","H"+i+"_SI");return sheet("Courses",["ID","Name","Location","Par"].concat(h));}
function SS(){var h=[];for(var i=1;i<=18;i++)h.push("H"+i);return sheet("Scores",["ID","Date","CourseID","CourseName","PlayerID","PlayerName","Handicap","Tournament"].concat(h).concat(["Total","Stableford","ModStableford","StrokeNet","ModStroke"]));}
function AS(){var s=sheet("Admins",["Email","Password"]);if(s.getLastRow()<=1)s.appendRow(["jawadayaz@gmail.com","luckylast"]);return s;}
function getAll(){return{players:getPlayers(),courses:getCourses(),scores:getScores(),tournaments:getTournaments()};}
function TS(){return sheet("Tournaments",["Data"]);}
function getTournaments(){var s=TS(),r=s.getDataRange().getValues();if(r.length<=1||!r[1][0])return[];try{return JSON.parse(r[1][0]);}catch(e){return[];}}
function saveTournaments(data){var s=TS();if(s.getLastRow()<2)s.appendRow([JSON.stringify(data)]);else s.getRange(2,1).setValue(JSON.stringify(data));return{ok:true};}
function getAdmins(){var r=AS().getDataRange().getValues();return r.length<=1?[]:r.slice(1).map(function(r){return{email:r[0],password:r[1]};});}
function getPlayers(){var r=PS().getDataRange().getValues();return r.length<=1?[]:r.slice(1).map(function(r){return{id:r[0],name:r[1],email:r[2],handicap:parseFloat(r[3])||0};});}
function getCourses(){var r=CS().getDataRange().getValues();return r.length<=1?[]:r.slice(1).map(function(r){var h=[];for(var i=0;i<18;i++)h.push({par:parseInt(r[4+i*2])||4,si:parseInt(r[5+i*2])||(i+1)});return{id:r[0],name:r[1],location:r[2],par:parseInt(r[3])||72,holes:h};});}
function getScores(){var r=SS().getDataRange().getValues();return r.length<=1?[]:r.slice(1).map(function(r){return{id:r[0],date:r[1],courseId:r[2],courseName:r[3],playerId:r[4],playerName:r[5],handicap:r[6],tournament:r[7],scores:r.slice(8,26)};});}
function addPlayer(p){PS().appendRow([Date.now(),p.name,p.email||"",p.handicap||0]);return{success:true};}
function updatePlayer(p){var s=PS(),d=s.getDataRange().getValues();for(var i=1;i<d.length;i++){if(String(d[i][0])===String(p.id)){if(p.name)s.getRange(i+1,2).setValue(p.name);s.getRange(i+1,4).setValue(p.handicap);return{success:true};}}return{success:false};}
function deleteRow(n,id){var s=SpreadsheetApp.getActiveSpreadsheet().getSheetByName(n);if(!s)return{success:false};var d=s.getDataRange().getValues();for(var i=1;i<d.length;i++){if(String(d[i][0])===String(id)){s.deleteRow(i+1);return{success:true};}}return{success:false};}
function addCourse(c){var h=[];c.holes.forEach(function(x){h.push(x.par,x.si);});CS().appendRow([Date.now(),c.name,c.location||"",c.holes.reduce(function(a,x){return a+x.par;},0)].concat(h));return{success:true};}
function updateCourse(c){var s=CS(),d=s.getDataRange().getValues();for(var i=1;i<d.length;i++){if(String(d[i][0])===String(c.id)){var row=[c.id,c.name,c.location||"",c.holes.reduce(function(a,x){return a+x.par;},0)];c.holes.forEach(function(x){row.push(x.par,x.si);});s.getRange(i+1,1,1,row.length).setValues([row]);return{success:true};}}return{success:false};}
function addScores(pl){var s=SS();pl.forEach(function(sc){var t=sc.scores.reduce(function(a,v){return a+(parseInt(v)||0);},0);s.appendRow([Date.now(),sc.date,sc.courseId,sc.courseName,sc.playerId,sc.playerName,sc.handicap,sc.tournament||""].concat(sc.scores).concat([t,sc.stableford||"",sc.modStableford||"",sc.strokeNet||"",sc.modStroke||""]));});return{success:true};}
function getScorecardResult(token){
  if(!token)return{error:"No token"};
  var cache=CacheService.getScriptCache();
  var val=cache.get(token);
  if(!val)return{error:"Result not ready — try waiting a few more seconds and refreshing"};
  try{return JSON.parse(val);}catch(e){return{error:"Parse error: "+e};}
}
function extractScorecard(d){
  // Set your Anthropic API key: Apps Script > Project Settings > Script properties > Add: ANTHROPIC_KEY = sk-ant-...
  var key=PropertiesService.getScriptProperties().getProperty("ANTHROPIC_KEY");
  if(!key)return{error:"Add ANTHROPIC_KEY to Script Properties in Apps Script project settings"};
  var payload={model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:d.mimeType,data:d.imageBase64}},{type:'text',text:'Extract golf scorecard. Return ONLY valid JSON, no markdown: {name:"CourseName",location:"City",holes:[{par:4,si:1},...total 18 holes]}. Exactly 18 holes, par values 3 or 4 or 5 only, si values unique integers 1 through 18.'}]}]};
  var res=UrlFetchApp.fetch("https://api.anthropic.com/v1/messages",{method:"post",contentType:"application/json",headers:{"x-api-key":key,"anthropic-version":"2023-06-01"},payload:JSON.stringify(payload),muteHttpExceptions:true});
  var j=JSON.parse(res.getContentText());
  if(j.error)return{error:j.error.message||JSON.stringify(j.error)};
  var txt=(j.content&&j.content[0]&&j.content[0].text)||"";
  var BT=String.fromCharCode(96);var clean=txt.split(BT+BT+BT+"json").join("").split(BT+BT+BT).join("").trim();var m=clean.match(/[{][\s\S]*[}]/);
  if(!m)return{error:"Could not parse response: "+txt.slice(0,100)};
  try{return JSON.parse(m[0]);}catch(e){return{error:"JSON parse error: "+e.toString()};}
}`;

    setBusy(true);
    try{
      const p={id:Date.now(),name:form.name.trim(),email:form.email.trim(),handicap:parseFloat(form.handicap)||0};

    setBusy(false);

    setDlg({msg:"Delete "+p.name+"?",detail:"This player will be permanently removed from the roster.",ok:async()=>{
      setDlg(null);setBusy(true);
      try{
        if(url){await apiPost(url,"deletePlayer",{id:p.id});await refresh();}

        </div>

          <button className="btn btn-primary" onClick={add} disabled={busy}>{busy?<><Spin/>Adding…</>:"Add Player"}</button>
          <button className="btn btn-ghost btn-sm" onClick={refresh}>↻ Refresh</button>
        </div>
      </div>
      <div className="card">
        <div className="card-title">Roster ({data.players.length} players)</div>
        {!data.players.length?<p style={{fontSize:13,color:"var(--gray-400)"}}>No players yet — add some above.</p>:(
          <table className="dt">
            <thead><tr><th>#</th><th>Name</th><th>Email</th><th>HC</th><th></th></tr></thead>
            <tbody>
              {data.players.map((p,i)=>(
                <tr key={p.id}>
                  <td style={{width:32,color:"var(--gray-400)"}}>{i+1}</td>
                  <td style={{fontWeight:600}}>{p.name}</td>
                  <td style={{fontSize:12.5}}>{p.email}</td>
                  <td style={{width:100}}>
                    {editId===p.id
                      ?<div style={{display:"flex",gap:5,alignItems:"center"}}>
                          <input type="text" inputMode="decimal" value={editHcp} onChange={e=>setEditHcp(e.target.value.replace(/[^0-9.]/g,""))} autoFocus style={{width:58,padding:"3px 7px",border:"1.5px solid var(--green-light)",borderRadius:6,fontWeight:700}} onKeyDown={e=>e.key==="Enter"&&saveHcp(p)}/>

                  </td>

// ── Course image extraction ──────────────────────────────────────────────────
// Image scanning is proxied through Google Apps Script to avoid CORS issues.
// The GAS function extractScorecard() calls the Anthropic API server-side.
// Requires ANTHROPIC_KEY set in Script Properties (Project Settings).
async function extractCourseFromImage(file, gasUrl) {
  if (!gasUrl) {
    throw new Error("Connect to Google Sheets first (Setup tab) to enable scorecard scanning.");
  }

  // Read file as base64
  const b64 = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result.split(",")[1]);
    r.onerror = () => rej(new Error("Could not read file"));
    r.readAsDataURL(file);
  });

  const mt = file.type || "image/jpeg";
  const token = "sc_" + Date.now();

  // Step 1: POST image to GAS (fire-and-forget, no-cors)
  await fetch(gasUrl, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({ action: "extractScorecard", data: { imageBase64: b64, mimeType: mt, token } })
  });

  // Small wait for GAS to process
  await new Promise(r => setTimeout(r, 6000));

  // Step 2: Poll for result via JSONP GET
  const result = await new Promise((resolve, reject) => {
    const cb = "_sc" + Date.now();
    const el = document.createElement("script");
    let done = false;
    const cleanup = () => { if(done) return; done=true; clearTimeout(t); delete window[cb]; el.parentNode && el.parentNode.removeChild(el); };
    const t = setTimeout(() => { cleanup(); reject(new Error("Timed out — GAS may still be processing. Update your Apps Script with the latest code from Setup and redeploy.")); }, 20000);
    window[cb] = (d) => { cleanup(); d && d.error ? reject(new Error(d.error)) : resolve(d); };
    el.onerror = () => { cleanup(); reject(new Error("Could not reach Apps Script.")); };
    el.src = gasUrl + "?action=getScorecardResult&token=" + token + "&callback=" + cb;
    document.head.appendChild(el);
  });

  if (!result || !result.holes || result.holes.length !== 18) {
    throw new Error("Could not extract scorecard data. Try a clearer photo or enter manually.");
  }

  // Normalise SI values
  const used = new Set();
  result.holes = result.holes.map(h => {
    let si = h.si;
    if (used.has(si) || si < 1 || si > 18) { for(let n=1;n<=18;n++){if(!used.has(n)){si=n;break;}} }
    used.add(si);
    return { par: h.par, si };
  });

  return result;
}
